<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoAsylum | Faculty Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; overflow: hidden; background-color: #f1f5f9; }
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: sans-serif;
        }
        #google-button { margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color: #1e293b;">AlgoAsylum Portal</h1>
        <p style="color: #64748b;">Please sign in to access the Chandra Socratic Tutor.</p>
        <div id="google-button"></div>
    </div>

    <script src="https://accounts.google.com/gsi/client"></script>

    <script type="module">
        import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js"

        // Function to start Chandra once authenticated
        function startChandra(userEmail) {
            // 1. Wipe any existing chatbot elements to prevent cached config
            const existing = document.querySelector("flowise-fullchatbot");
            if (existing) existing.remove();

            // 2. Add fresh element
            const chatbotElement = document.createElement("flowise-fullchatbot");
            document.body.appendChild(chatbotElement);
          
            console.log("Initializing Chandra for:", userEmail);

            // 2. Initialize with Metadata Overrides
            Chatbot.initFull({
                chatflowid: "3d1826ee-a1bb-4259-aa6a-a0fd44e0cd32", 
                apiHost: "https://chandra.algoasylum.com",
                chatflowConfig: {
                    sessionId: userEmail,
                    // systemMessagePrompt: "[STUDENT IDENTITY: " + userEmail + "]\n\n" + socraticPrompt
                    systemMessagePrompt: `[STUDENT IDENTITY: ${userEmail}]\n\n` + socraticPrompt
                    // The library maps everything inside here to the backend's overrideConfig
                    vars: {
                        userId: userEmail
                    },
                    analytics: {
                        langSmith: {
                            userId: userEmail
                        }
                    },
                    metadata: {
                        userId: userEmail
                    }
                },              
                theme: {
                    chatWindow: {
                        showTitle: true,
                        title: `Chandra (User: ${userEmail})`,
                        height: "100%",
                        width: "100%",
                        fontSize: 18,
                        welcomeMessage: `Welcome! I am Chandra. I've logged you in as ${userEmail}. Shall we begin Day 1?`
                    }
                }
            });
        }

        // Callback function for Google Sign-In
        window.handleCredentialResponse = (response) => {
            try {
                // Decode the user email from the JWT
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                const email = payload.email;

                console.log("Login successful, email captured:", email);

                // Hide the login screen
                document.getElementById('login-overlay').style.display = 'none';

                // Fire up the AI
                startChandra(email);
            } catch (error) {
                console.error("Error decoding Google credential:", error);
            }
        };

        // Initialize the Google Button on page load
        window.onload = () => {
            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({
                    client_id: "878323377653-ttsnclul66mnclgd7gcs0in86ghm2o2o.apps.googleusercontent.com",
                    callback: window.handleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById("google-button"),
                    { theme: "outline", size: "large" }
                );
            }
        };
    </script>
</body>
</html>
