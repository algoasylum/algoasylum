<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoAsylum | Chandra Tutor</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { text-align: center; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js"

    // 1. This function launches Chandra after a successful login
    function startChandra(userEmail) {
        Chatbot.initFull({
            chatflowid: "YOUR_CHATFLOW_ID",
            apiHost: "https://chandra.algoasylum.com",
            chatflowConfig: {
                sessionId: userEmail // Uses their Google email for LangSmith tracking
            },
            theme: {
                chatWindow: {
                    showTitle: true,
                    title: `Chandra Tutor (Logged in: ${userEmail})`,
                    height: "100%",
                    width: "100%",
                    fontSize: 18
                }
            }
        });
    }

    // 2. This is the callback Google hits after the user picks an account
    window.handleCredentialResponse = (response) => {
        try {
            // Decode the JWT (JSON Web Token) payload
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            
            const userEmail = payload.email;

            // Hide the login overlay
            document.getElementById('login-overlay').style.display = 'none';

            // Fire up Chandra
            startChandra(userEmail);
        } catch (e) {
            console.error("Login failed during token decoding:", e);
        }
    };

    // 3. Initialize the Google Identity button on load
    window.onload = () => {
        google.accounts.id.initialize({
            client_id: "YOUR_CLIENT_ID_HERE.apps.googleusercontent.com",
            callback: window.handleCredentialResponse
        });
        
        google.accounts.id.renderButton(
            document.getElementById("google-button"),
            { theme: "outline", size: "large", text: "signin_with" }
        );
    };
</script>
</body>
</html>
