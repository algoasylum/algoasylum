<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Prompter</title>
<style>
  body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
  }

  /* Setup Screen - Not Mirrored */
  #setup-ui {
    padding: 30px;
    font-size: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 15px;
    max-width: 400px;
  }
  
  input[type="text"] {
    font-size: 1.2rem;
    padding: 10px;
    background: #222;
    color: white;
    border: 1px solid #555;
    border-radius: 5px;
  }

  button {
    font-size: 1.2rem;
    padding: 15px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:active {
    background: #0056b3;
  }

  /* Prompter Screen - Mirrored */
  #prompter-ui {
    display: none; 
    font-size: 9vw; 
    padding: 50px 20px 80vh 20px; 
    line-height: 1.6;
    transform: scaleX(-1);
  }

  #debugger {
    position: fixed;
    top: 10px;
    right: 10px;
    color: #444; 
    font-size: 14px;
    font-family: monospace;
    z-index: 999;
    transform: scaleX(-1); 
  }
</style>
</head>
<body>

  <!-- 1. Setup Interface -->
  <div id="setup-ui">
    <h2>Server Prompter</h2>
    <label for="file-url">Script filename or URL:</label>
    <input type="text" id="file-url" value="script.html" />
    <button id="load-btn">Load & Start</button>
    <div id="error-msg" style="color: #ff4444; font-size: 1rem;"></div>
  </div>

  <!-- 2. Prompter Interface -->
  <div id="prompter-ui">
    <div id="debugger">Waiting for key...</div>
    <div id="script-container"></div>
  </div>

  <script>
    let isPlaying = false;
    let speed = 2; // Pixels per frame
    let animationId;
    let lastToggleTime = 0;

    const setupUI = document.getElementById('setup-ui');
    const prompterUI = document.getElementById('prompter-ui');
    const scriptContainer = document.getElementById('script-container');
    const debuggerEl = document.getElementById('debugger');
    const errorMsg = document.getElementById('error-msg');

    // --- FETCH FROM SERVER ---
    document.getElementById('load-btn').addEventListener('click', function() {
      const url = document.getElementById('file-url').value;
      
      fetch(url)
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.text();
        })
        .then(text => {
          // Convert newlines to paragraphs
          const html = text.split('\n').map(line => {
            return line.trim() === '' ? '<br>' : `<p>${line}</p>`;
          }).join('');
          
          scriptContainer.innerHTML = html;
          
          // Hide setup, show prompter
          setupUI.style.display = 'none';
          prompterUI.style.display = 'block';
        })
        .catch(error => {
          errorMsg.innerText = "Error loading file: " + error.message;
        });
    });

    // --- SCROLLING & REMOTE LOGIC ---
    function scrollText() {
      if (isPlaying) {
        window.scrollBy(0, speed);
        animationId = requestAnimationFrame(scrollText);
      }
    }

    function togglePlay() {
      const now = Date.now();
      if (now - lastToggleTime < 500) return; // 500ms debounce
      
      lastToggleTime = now;
      isPlaying = !isPlaying;
      
      if (isPlaying) {
        debuggerEl.innerText = "PLAYING";
        scrollText();
      } else {
        debuggerEl.innerText = "PAUSED";
        cancelAnimationFrame(animationId);
      }
    }

    // Touch anywhere on the prompter text to toggle
    document.addEventListener('pointerdown', (e) => {
      if (prompterUI.style.display === 'block' && e.target.id !== 'debugger') {
        togglePlay();
      }
    });

    // Prevent default scrolling for Arrow keys
    document.addEventListener('keydown', (e) => {
      if (prompterUI.style.display === 'block') {
        e.preventDefault();
      }
    });

    // Listen for the remote's keyup event
    document.addEventListener('keyup', (e) => {
      if (prompterUI.style.display === 'block') {
        e.preventDefault();
        debuggerEl.innerText = `Key: ${e.key}`;
        togglePlay();
      }
    });
  </script>
</body>
</html>
